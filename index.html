<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b3d2e" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<title>Kasir Klinik Pijat SEHAT NUSANTARA</title>
<style>
  :root{
    --bg:#fbf7ef; --ink:#13241c; --muted:#3a4f43; --line:#c7d3c9;
    --brand:#0b3d2e; --brand-ink:#ffffff; --accent:#b4530f; --ok:#135e30;
    --warn:#8a2d0c; --card:#ffffff; --focus:#1144c4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Atkinson Hyperlegible","Segoe UI",Tahoma,Verdana,sans-serif;
    font-size:1.12rem; line-height:1.5; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:640px;margin:0 auto;padding:16px 16px 110px;}
  header.appbar{background:var(--brand);color:var(--brand-ink);padding:14px 16px;position:sticky;top:0;z-index:10;}
  header.appbar h1{font-size:1.25rem;margin:0;font-weight:800;}
  header.appbar p{margin:2px 0 0;font-size:.85rem;opacity:.92;}
  h2.screen-title{font-size:1.5rem;margin:8px 0 14px;font-weight:800;outline:none;}
  h3{font-size:1.1rem;margin:18px 0 8px;}
  p.help{color:var(--muted);margin:0 0 16px;}
  button{font-family:inherit;font-size:1.12rem;cursor:pointer;}
  .btn{display:block;width:100%;text-align:left;background:var(--card);color:var(--ink);
    border:2px solid var(--line);border-radius:14px;padding:18px;margin:0 0 12px;min-height:62px;font-weight:600;}
  .btn:hover{border-color:var(--brand);}
  .btn .sub{display:block;font-size:.82rem;color:var(--muted);font-weight:500;margin-top:4px;}
  .btn.primary{background:var(--brand);color:var(--brand-ink);border-color:var(--brand);}
  .btn.primary .sub{color:#d8e6df;}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.accent .sub{color:#fde3cf;}
  .btn.big{font-size:1.35rem;min-height:92px;font-weight:800;}
  .btn.ghost{background:transparent;}
  .btn.danger{color:var(--warn);border-color:#e6c0b2;}
  .btn[aria-pressed="true"]{outline:3px solid var(--focus);}
  :focus-visible{outline:4px solid var(--focus);outline-offset:3px;border-radius:8px;}
  .row{display:flex;gap:10px;} .row .btn{margin-bottom:0;}
  label{display:block;font-weight:700;margin:14px 0 6px;}
  input,select{width:100%;font-size:1.18rem;padding:14px;border:2px solid var(--line);border-radius:12px;font-family:inherit;background:#fff;color:var(--ink);}
  .card{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:16px;margin:0 0 14px;}
  .qty{display:flex;align-items:center;gap:12px;justify-content:center;margin:18px 0;}
  .qty button{width:84px;height:84px;border-radius:18px;border:2px solid var(--brand);background:#fff;font-size:2.4rem;font-weight:800;color:var(--brand);}
  .qty .num{font-size:3rem;font-weight:800;min-width:80px;text-align:center;}
  .total{font-size:1.8rem;font-weight:800;margin:10px 0;}
  .muted{color:var(--muted);}
  .list-item{border-bottom:1px solid var(--line);padding:12px 0;}
  .stat{font-size:1.35rem;font-weight:800;margin:2px 0;}
  .stat span{font-size:.95rem;font-weight:600;color:var(--muted);display:block;}
  .backlink{background:none;border:none;color:var(--brand);font-weight:700;padding:10px 0;text-decoration:underline;font-size:1.05rem;}
  .visually-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  .divider{height:1px;background:var(--line);margin:18px 0;}
  .ledger{font-size:1.02rem;}
  .ledger .ln{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dotted var(--line);}
  .ledger .ln.totline{font-weight:800;border-bottom:2px solid var(--ink);}
</style>
</head>
<body>
<header class="appbar">
  <h1 id="appTitle">Kasir Klinik Pijat</h1>
  <p id="appSub">SEHAT NUSANTARA</p>
</header>
<div class="wrap"><main id="app"></main></div>
<div id="announce" class="visually-hidden" role="status" aria-live="assertive"></div>

<script src="xlsx.full.min.js"></script>
<script>
"use strict";

/* =================== PENYIMPANAN =================== */
var DB_KEY="kasir_panti_v2";
function defaultServices(){
  return [
    {id:"s1",name:"Pijat Relaksasi",price:100000,recipe:{itemId:"oil",qty:50}},
    {id:"s2",name:"Pijat Keseleo",price:100000,recipe:{itemId:"oil",qty:50}},
    {id:"s3",name:"Refleksi",price:100000,recipe:{itemId:"oil",qty:50}},
    {id:"s4",name:"Acupressure",price:100000,recipe:null}
  ];
}
function defaultInventory(){
  return [
    {id:"oil",name:"Minyak Pijat",currentStock:0,minStockAlert:500,unit:"ml"}
  ];
}
function blankDB(){
  return {
    settings:{
      pantiName:"Klinik Pijat Tunanetra SEHAT NUSANTARA",
      ownerPin:"", phone:"0813 1850 744",
      address:"Jl. Kramat Sentiong No. 57A, Jakarta Pusat",
      transportFee:20000, defaultCommission:60, setupDone:false
    },
    services:defaultServices(), therapists:[],
    transactions:[], expenses:[], commissionPayments:[], capital:[], assets:[],
    customers:[],
    inventory:defaultInventory()
  };
}
var db=loadDB();
function loadDB(){
  try{
    var raw=localStorage.getItem(DB_KEY); if(!raw) return blankDB();
    var d=JSON.parse(raw), b=blankDB();
    for(var k in b){ if(!(k in d)) d[k]=b[k]; }
    for(var s in b.settings){ if(!(s in d.settings)) d.settings[s]=b.settings[s]; }
    if(d.services) {
      d.services.forEach(function(s){
        if(s.recipe === undefined) {
          if(s.id === "s1" || s.id === "s2" || s.id === "s3") {
            s.recipe = { itemId: "oil", qty: 50 };
          } else {
            s.recipe = null;
          }
        }
      });
    }
    return d;
  }catch(e){ return blankDB(); }
}
function saveDB(){ try{ localStorage.setItem(DB_KEY,JSON.stringify(db)); }catch(e){ alert("Data gagal disimpan di perangkat."); } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* =================== FORMAT =================== */
function rupiah(n){ n=Math.round(n||0); return (n<0?"-Rp ":"Rp ")+Math.abs(n).toLocaleString("id-ID"); }
function pad(n){ return (n<10?"0":"")+n; }
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function monthOf(s){ return (s||"").slice(0,7); }
function thisMonth(){ return todayStr().slice(0,7); }
function namaBulan(ym){ var b=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"]; var p=ym.split("-"); return b[parseInt(p[1],10)-1]+" "+p[0]; }
function tglPanjang(s){ var b=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"]; var p=s.split("-"); return parseInt(p[2],10)+" "+b[parseInt(p[1],10)-1]+" "+p[0]; }
function terbilang(n){
  n=Math.round(Math.abs(n)); if(n===0) return "nol";
  var sa=["","satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan","sepuluh","sebelas"];
  function w(x){
    if(x<12) return sa[x];
    if(x<20) return w(x-10)+" belas";
    if(x<100){var p=Math.floor(x/10),r=x%10;return sa[p]+" puluh"+(r?" "+sa[r]:"");}
    if(x<200) return "seratus"+(x-100?" "+w(x-100):"");
    if(x<1000){var p=Math.floor(x/100),r=x%100;return sa[p]+" ratus"+(r?" "+w(r):"");}
    if(x<2000) return "seribu"+(x-1000?" "+w(x-1000):"");
    if(x<1000000){var p=Math.floor(x/1000),r=x%1000;return w(p)+" ribu"+(r?" "+w(r):"");}
    if(x<1000000000){var p=Math.floor(x/1000000),r=x%1000000;return w(p)+" juta"+(r?" "+w(r):"");}
    var p=Math.floor(x/1000000000),r=x%1000000000;return w(p)+" miliar"+(r?" "+w(r):"");
  }
  return w(n);
}

/* =================== KERANGKA TAMPILAN =================== */
var app=document.getElementById("app");
function announce(m){ var e=document.getElementById("announce"); e.textContent=""; setTimeout(function(){ e.textContent=m; },60); }
function setHeader(){ document.getElementById("appSub").textContent=db.settings.pantiName||"SEHAT NUSANTARA"; }
function render(html){ app.innerHTML=html; setHeader(); var t=app.querySelector(".screen-title"); if(t){ t.setAttribute("tabindex","-1"); t.focus(); } }
function el(id){ return document.getElementById(id); }
function on(id,ev,fn){ var e=el(id); if(e) e.addEventListener(ev,fn); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function digits(v){ return parseInt(String(v||"").replace(/\D/g,""),10)||0; }
function each(sel,fn){ Array.prototype.forEach.call(app.querySelectorAll(sel),fn); }

/* =================== MULAI =================== */
function start(){ if(!db.settings.setupDone) setupName(); else home(); }

/* ---------- Pengaturan awal ---------- */
function setupName(){
  render(
    '<h2 class="screen-title">Selamat datang</h2>'+
    '<p class="help">Mari atur sekali saja. Beberapa hal sudah saya isikan, tinggal periksa.</p>'+
    '<label for="nm">Nama klinik</label>'+
    '<input id="nm" type="text" value="'+esc(db.settings.pantiName)+'" />'+
    '<label for="pin">Buat PIN pemilik (4 sampai 6 angka)</label>'+
    '<input id="pin" type="tel" inputmode="numeric" placeholder="contoh: 1234" value="'+esc(db.settings.ownerPin)+'" />'+
    '<p class="help">PIN melindungi laporan keuangan dan pengaturan.</p>'+
    '<button class="btn primary big" id="next">Lanjut</button>'
  );
  on("next","click",function(){
    var nm=el("nm").value.trim(), pin=el("pin").value.trim();
    if(!nm){ announce("Nama klinik belum diisi."); el("nm").focus(); return; }
    if(!/^[0-9]{4,6}$/.test(pin)){ announce("PIN harus 4 sampai 6 angka."); el("pin").focus(); return; }
    db.settings.pantiName=nm; db.settings.ownerPin=pin; saveDB(); setupIdentity();
  });
}
function setupIdentity(){
  render(
    '<h2 class="screen-title">Identitas klinik</h2>'+
    '<p class="help">Dipakai pada struk dan laporan.</p>'+
    '<label for="ph">Nomor telepon</label>'+
    '<input id="ph" type="text" value="'+esc(db.settings.phone)+'" />'+
    '<label for="ad">Alamat</label>'+
    '<input id="ad" type="text" value="'+esc(db.settings.address)+'" />'+
    '<button class="btn primary big" id="next">Lanjut</button>'+
    '<button class="backlink" id="back">Kembali</button>'
  );
  on("next","click",function(){ db.settings.phone=el("ph").value.trim(); db.settings.address=el("ad").value.trim(); saveDB(); setupTherapists(); });
  on("back","click",setupName);
}
function setupTherapists(){
  var list=db.therapists.length?db.therapists.map(function(t){return '<div class="list-item">'+esc(t.name)+'</div>';}).join(""):'<p class="muted">Belum ada terapis.</p>';
  render(
    '<h2 class="screen-title">Daftar terapis</h2>'+
    '<p class="help">Bagi hasil saat ini '+db.settings.defaultCommission+' persen untuk terapis. Bisa diubah nanti.</p>'+
    '<div class="card">'+list+'</div>'+
    '<label for="thn">Nama terapis</label>'+
    '<input id="thn" type="text" placeholder="contoh: Budi" />'+
    '<button class="btn accent" id="add">Tambah terapis</button>'+
    '<div class="divider"></div>'+
    '<button class="btn primary big" id="done">Selesai, mulai pakai</button>'
  );
  on("add","click",function(){ var n=el("thn").value.trim(); if(!n){announce("Nama belum diisi.");return;} db.therapists.push({id:uid(),name:n}); saveDB(); announce("Terapis "+n+" ditambahkan."); setupTherapists(); });
  on("done","click",function(){ db.settings.setupDone=true; saveDB(); announce("Pengaturan selesai."); home(); });
}

/* ---------- Beranda ---------- */
function home(){
  var pend=db.transactions.filter(function(t){return !t.settled;});
  var note=pend.length?'<p class="help" role="note">Pengingat: '+pend.length+' transaksi belum lunas.</p>':'';
  
  var lowStockItems = (db.inventory || []).filter(function(i){
    return i.currentStock <= i.minStockAlert;
  });
  var stockNotes = lowStockItems.map(function(i){
    return '<p class="help" style="color:var(--warn); font-weight:bold;" role="alert">⚠️ Peringatan: Stok '+esc(i.name)+' hampir habis ('+i.currentStock+' '+esc(i.unit)+' tersisa)!</p>';
  }).join("");

  var today = todayStr();
  var txToday = db.transactions.filter(function(t){ return t.dateStr === today; });
  var revToday = txToday.reduce(function(a, t){ return a + t.total; }, 0);
  var cashNow = neraca().kas;

  var statsHTML = '<div class="row" style="margin-bottom:16px; gap:8px;">'+
    '<div class="card" style="flex:1; padding:12px; margin:0; text-align:center; border:2px solid var(--brand); border-radius:12px; background:var(--card);">'+
      '<span class="muted" style="font-size:0.75rem; font-weight:600; display:block; text-transform:uppercase; letter-spacing:0.5px;">Kas Usaha</span>'+
      '<span style="font-size:1.1rem; font-weight:800; color:var(--brand); display:block; margin-top:2px;">'+rupiah(cashNow)+'</span>'+
    '</div>'+
    '<div class="card" style="flex:1; padding:12px; margin:0; text-align:center; border:2px solid var(--muted); border-radius:12px; background:var(--card);">'+
      '<span class="muted" style="font-size:0.75rem; font-weight:600; display:block; text-transform:uppercase; letter-spacing:0.5px;">Sesi Hari Ini</span>'+
      '<span style="font-size:1.1rem; font-weight:800; color:var(--ink); display:block; margin-top:2px;">'+txToday.length+' Sesi</span>'+
    '</div>'+
    '<div class="card" style="flex:1; padding:12px; margin:0; text-align:center; border:2px solid var(--accent); border-radius:12px; background:var(--card);">'+
      '<span class="muted" style="font-size:0.75rem; font-weight:600; display:block; text-transform:uppercase; letter-spacing:0.5px;">Pendapatan Hari Ini</span>'+
      '<span style="font-size:1.1rem; font-weight:800; color:var(--accent); display:block; margin-top:2px;">'+rupiah(revToday)+'</span>'+
    '</div>'+
  '</div>';

  render(
    '<h2 class="screen-title">Menu utama</h2>'+note+stockNotes+statsHTML+
    '<button class="btn primary big" id="m1">Transaksi baru<span class="sub">Catat pijat yang baru selesai</span></button>'+
    '<button class="btn big" id="m2">Catat pengeluaran<span class="sub">Minyak, listrik, transport, dll</span></button>'+
    '<button class="btn big" id="m3">Daftar piutang<span class="sub">Pelanggan yang belum bayar</span></button>'+
    '<button class="btn big" id="m4">Bayar komisi terapis<span class="sub">Lihat & catat pembayaran</span></button>'+
    '<button class="btn big" id="m5">Riwayat transaksi<span class="sub">Perbaiki atau hapus catatan</span></button>'+
    '<button class="btn big" id="m6">Laporan & Kas Usaha<span class="sub">Terkunci PIN. Laba Rugi, Neraca, & Buku Kas</span></button>'+
    '<button class="btn big" id="m8">Promosi & Marketing<span class="sub">Kirim promo WA & daftar pelanggan teraktif</span></button>'+
    '<button class="btn big ghost" id="m7">Pengaturan<span class="sub">Terkunci PIN</span></button>'
  );
  on("m1","click",txStart); on("m2","click",expenseScreen); on("m3","click",debtsScreen);
  on("m4","click",commissionScreen); on("m5","click",historyScreen);
  on("m6","click",function(){ requirePin(financialMenuScreen); });
  on("m8","click",marketingScreen);
  on("m7","click",function(){ requirePin(settingsScreen); });
}
function requirePin(next){
  render('<h2 class="screen-title">Masukkan PIN pemilik</h2><label for="p">PIN</label><input id="p" type="tel" inputmode="numeric" /><button class="btn primary big" id="ok">Buka</button><button class="backlink" id="b">Kembali ke menu</button>');
  on("ok","click",function(){ if(el("p").value.trim()===db.settings.ownerPin) next(); else { announce("PIN salah."); el("p").value=""; el("p").focus(); } });
  on("b","click",home);
}

/* =================== TRANSAKSI =================== */
var draft=null;
function txStart(){ draft={items:[],performer:null,therapistId:null,therapistName:null,location:null,transport:0,payment:null,customer:"",customerPhone:""}; txPickService(); }
function txPickService(){
  var btns=db.services.map(function(s){return '<button class="btn" data-id="'+s.id+'">'+esc(s.name)+'<span class="sub">'+rupiah(s.price)+'</span></button>';}).join("");
  var cart=draft.items.length?'<p class="help" role="note">Sudah dipilih: '+draft.items.map(function(i){return esc(i.name)+" ×"+i.qty;}).join(", ")+'.</p>':'';
  render('<h2 class="screen-title">Pilih layanan</h2>'+cart+btns+'<button class="backlink" id="cancel">Batal & kembali ke menu</button>');
  each("[data-id]",function(b){ b.addEventListener("click",function(){ var s=db.services.filter(function(x){return x.id===b.getAttribute("data-id");})[0]; txQty(s); }); });
  on("cancel","click",home);
}
function txQty(service){
  var st={qty:1,price:service.price,editing:false};
  function draw(){
    var priceBlock=st.editing
      ? '<label for="pr">Harga satuan (rupiah)</label><input id="pr" type="tel" inputmode="numeric" value="'+st.price+'" /><button class="btn accent" id="apply">Terapkan harga</button>'
      : '<p class="help">Harga satuan: '+rupiah(st.price)+(st.price!==service.price?' (diubah dari '+rupiah(service.price)+')':'')+' <button class="backlink" id="edit" style="display:inline">Ubah harga / diskon</button></p>';
    render(
      '<h2 class="screen-title">Berapa orang untuk '+esc(service.name)+'?</h2>'+
      '<div class="qty"><button id="minus" aria-label="Kurangi">−</button><span class="num" id="qn">'+st.qty+'</span><button id="plus" aria-label="Tambah">+</button></div>'+
      priceBlock+
      '<p class="total" id="tt">Total: '+rupiah(st.price*st.qty)+'</p>'+
      '<button class="btn primary big" id="ok">Pakai ini</button>'+
      '<button class="backlink" id="back">Kembali</button>'
    );
    on("minus","click",function(){ if(st.qty>1){st.qty--; sync();} });
    on("plus","click",function(){ st.qty++; sync(); });
    on("edit","click",function(){ st.editing=true; draw(); });
    on("apply","click",function(){ var v=digits(el("pr").value); if(v<=0){announce("Harga belum benar.");return;} st.price=v; st.editing=false; draw(); announce("Harga satuan diubah menjadi "+terbilang(v)+" rupiah."); });
    on("ok","click",function(){
      if(st.editing){
        var v=digits(el("pr").value);
        if(v>0) st.price=v;
      }
      draft.items.push({serviceId:service.id,name:service.name,price:st.price,qty:st.qty});
      txAddMore();
    });
    on("back","click",txPickService);
  }
  function sync(){ el("qn").textContent=st.qty; el("tt").textContent="Total: "+rupiah(st.price*st.qty); announce("Jumlah "+terbilang(st.qty)+". Total "+terbilang(st.price*st.qty)+" rupiah."); }
  draw();
}
function txAddMore(){
  var sub=draft.items.reduce(function(a,i){return a+i.price*i.qty;},0);
  render('<h2 class="screen-title">Tambah layanan lain?</h2><p class="help">Untuk pelanggan yang sama. Sementara total '+rupiah(sub)+'.</p><button class="btn" id="more">Ya, tambah lagi</button><button class="btn primary big" id="cont">Tidak, lanjut</button>');
  on("more","click",txPickService); on("cont","click",txPerformer);
}
function txPerformer(){
  var th=db.therapists.map(function(t){return '<button class="btn" data-th="'+t.id+'">'+esc(t.name)+'</button>';}).join("");
  render('<h2 class="screen-title">Siapa yang memijat?</h2><button class="btn primary" id="self">Saya sendiri (pemilik)<span class="sub">Pendapatan penuh ke kas</span></button>'+(db.therapists.length?'<h3>Atau pilih terapis (bagi hasil)</h3>'+th:'<p class="help">Belum ada terapis.</p>')+'<button class="backlink" id="back">Kembali</button>');
  on("self","click",function(){ draft.performer="owner"; draft.therapistId=null; draft.therapistName=null; txLocation(); });
  each("[data-th]",function(b){ b.addEventListener("click",function(){ var t=db.therapists.filter(function(x){return x.id===b.getAttribute("data-th");})[0]; draft.performer="therapist"; draft.therapistId=t.id; draft.therapistName=t.name; txLocation(); }); });
  on("back","click",txAddMore);
}
function txLocation(){
  render('<h2 class="screen-title">Di mana layanannya?</h2><button class="btn primary" id="on">Di tempat (klinik)<span class="sub">Harga normal</span></button><button class="btn" id="call">Panggilan ke rumah<span class="sub">Tambah biaya transport</span></button><button class="backlink" id="back">Kembali</button>');
  on("on","click",function(){ draft.location="onsite"; draft.transport=0; txPayment(); });
  on("call","click",function(){ draft.location="callout"; txTransport(); });
  on("back","click",txPerformer);
}
function txTransport(){
  render('<h2 class="screen-title">Biaya transport</h2><p class="help">Diberikan penuh ke yang berangkat, tidak dibagi.</p><label for="tr">Jumlah (rupiah)</label><input id="tr" type="tel" inputmode="numeric" value="'+(db.settings.transportFee||0)+'" /><button class="btn primary big" id="ok">Pakai biaya ini</button><button class="backlink" id="back">Kembali</button>');
  on("ok","click",function(){ draft.transport=digits(el("tr").value); txPayment(); });

function txCustomerScreen(){

    searchInput.addEventListener("input", function(){
      var q = searchInput.value.toLowerCase();

      container.innerHTML = "";
      var matched = (db.customers || []).filter(function(c){
        return (c.name || "").toLowerCase().indexOf(q) !== -1 || (c.phone || "").toLowerCase().indexOf(q) !== -1;
      });
      if(matched.length > 0) {

          var btn = document.createElement("button");
          btn.className = "btn";

function calc(d){
  var jasa=d.items.reduce(function(a,i){return a+i.price*i.qty;},0);
  var total=jasa+(d.transport||0);
  var pct=d.performer==="therapist"?(db.settings.defaultCommission||0):0;
  var komisi=Math.round(jasa*pct/100);
  var trToTh=(d.performer==="therapist"&&d.location==="callout")?(d.transport||0):0;
  var take=komisi+trToTh;
  return {jasa:jasa,total:total,pct:pct,therapistTake:take,kasShare:total-take};
}
function txConfirm(){
  var c=calc(draft);
  var items=draft.items.map(function(i){return esc(i.name)+" ×"+i.qty+" = "+rupiah(i.price*i.qty);}).join("<br>");
  var who=draft.performer==="owner"?"Saya sendiri":"Terapis "+esc(draft.therapistName);
  var loc=draft.location==="callout"?"Panggilan (transport "+rupiah(draft.transport)+")":"Di tempat";
  var pay=draft.payment==="cash"?"Tunai":draft.payment==="transfer"?"Transfer/QRIS":"Belum bayar (piutang)";
  var bagi=draft.performer==="therapist"?'<p>Hak terapis (saat lunas): '+rupiah(c.therapistTake)+'<br>Hak kas/Pertuni: '+rupiah(c.kasShare)+'</p>':'';
  var custInfo = draft.customer ? '<br>Pelanggan: ' + esc(draft.customer) + (draft.customerPhone ? ' (' + esc(draft.customerPhone) + ')' : '') : '';
  
  var payCommCheckbox = '';
  if (draft.performer === "therapist" && draft.payment !== "unpaid" && c.therapistTake > 0) {
    payCommCheckbox = '<label style="display:flex; align-items:center; gap:12px; margin-top:14px; font-weight:700; cursor:pointer;">'+
      '<input type="checkbox" id="pay-comm-now" checked style="width:28px; height:28px; cursor:pointer;" />'+
      '<span>Bayar komisi terapis langsung saat ini</span>'+
    '</label>';
  }

  render('<h2 class="screen-title">Periksa & simpan</h2><div class="card"><p>'+items+'</p><p>Pelaksana: '+who+'<br>Lokasi: '+loc+'<br>Pembayaran: '+pay+custInfo+'</p>'+bagi+payCommCheckbox+'<p class="total">Total: '+rupiah(c.total)+'</p></div><button class="btn primary big" id="save">Simpan transaksi</button><button class="backlink" id="back">Kembali</button>');
  announce("Total "+terbilang(c.total)+" rupiah. Tekan simpan untuk menyimpan.");
  on("save","click",saveTx); on("back","click",txCustomerScreen);
}
function saveTx(){
  var c=calc(draft);
  
  var payCommNowEl = el("pay-comm-now");
  var payCommNow = payCommNowEl ? payCommNowEl.checked : false;

  var tx={id:uid(),createdAt:new Date().toISOString(),dateStr:todayStr(),items:draft.items.slice(),
    jasa:c.jasa,transport:draft.transport||0,total:c.total,performer:draft.performer,
    therapistId:draft.therapistId,therapistName:draft.therapistName,location:draft.location,
    payment:draft.payment,customer:draft.customer||"",customerPhone:draft.customerPhone||"",commissionPercent:c.pct,
    therapistTake:c.therapistTake,kasShare:c.kasShare,
    settled:draft.payment!=="unpaid",settledMethod:draft.payment!=="unpaid"?draft.payment:null,
    settledDate:draft.payment!=="unpaid"?todayStr():null};
    
  tx.items.forEach(function(item){
    var svc = db.services.filter(function(s){ return s.id === item.serviceId; })[0];
    if (svc && svc.recipe) {
      if(!db.inventory) db.inventory = defaultInventory();
      var inv = db.inventory.filter(function(i){ return i.id === svc.recipe.itemId; })[0];
      if (inv) {
        inv.currentStock = Math.max(0, inv.currentStock - (svc.recipe.qty * item.qty));
      }
    }
  });

  if (payCommNow && tx.therapistId && tx.therapistTake > 0) {
    db.commissionPayments.push({
      id: uid(),
      therapistId: tx.therapistId,
      amount: tx.therapistTake,
      dateStr: tx.dateStr,
      createdAt: new Date().toISOString(),
      note: "Bayar komisi instan (Transaksi " + tx.id.slice(-4) + ")"
    });
  }

  db.transactions.push(tx); saveDB(); txSaved(tx);
}
function txSaved(tx){
  render('<h2 class="screen-title">Transaksi tersimpan</h2><div class="card"><p class="total">'+rupiah(tx.total)+'</p><p class="muted">Untuk memperbaiki, buka Riwayat transaksi di menu utama.</p></div><button class="btn accent" id="wa">Kirim struk ke WhatsApp</button><button class="btn primary big" id="home">Selesai, ke menu utama</button>');
  announce("Transaksi tersimpan, total "+terbilang(tx.total)+" rupiah.");
  on("wa","click",function(){ sendReceipt(tx); });
  on("home","click",home);
}
function cleanPhone(num) {
  num = String(num || "").replace(/\D/g, "");
  if (num.startsWith("0")) {
    num = "62" + num.slice(1);
  }
  return num;
}
function sendReceipt(tx){
  var L=["*"+(db.settings.pantiName||"Klinik Pijat")+"*"];
  if(db.settings.address) L.push(db.settings.address);
  if(db.settings.phone) L.push("Telp: "+db.settings.phone);
  L.push("--------------------","Tanggal: "+tglPanjang(tx.dateStr));
  if(tx.customer) L.push("Pelanggan: "+tx.customer);
  if(tx.customerPhone) L.push("No WA: "+tx.customerPhone);
  L.push("--------------------");
  tx.items.forEach(function(i){ L.push(i.name+" x"+i.qty+"  "+rupiah(i.price*i.qty)); });
  if(tx.transport) L.push("Transport  "+rupiah(tx.transport));
  L.push("--------------------","*TOTAL: "+rupiah(tx.total)+"*");
  L.push("Pembayaran: "+(tx.payment==="cash"?"Tunai":tx.payment==="transfer"?"Transfer/QRIS":"Belum bayar"));
  L.push("","Terima kasih atas kunjungan Anda 🙏");
  var phone = cleanPhone(tx.customerPhone);
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(L.join("\n")),"_blank");
}

function debtsScreen(){
  var pend=db.transactions.filter(function(t){return !t.settled;});
  var tot=pend.reduce(function(a,t){return a+t.total;},0);
  var items=pend.length?pend.map(function(t){return '<div class="list-item"><strong>'+esc(t.customer||"Tanpa nama")+'</strong> — '+rupiah(t.total)+'<br><span class="muted">'+t.items.map(function(i){return esc(i.name);}).join(", ")+' · '+t.dateStr+'</span><br><button class="btn accent" data-id="'+t.id+'" style="margin-top:8px">Tandai sudah lunas</button></div>';}).join(""):'<p class="muted">Tidak ada piutang. Semua lunas.</p>';
  render('<h2 class="screen-title">Daftar piutang</h2><p class="help">'+(pend.length?"Ada "+pend.length+" belum bayar, total "+rupiah(tot)+".":"")+'</p>'+items+'<button class="backlink" id="back">Kembali ke menu</button>');
  each("[data-id]",function(b){ b.addEventListener("click",function(){ settle(b.getAttribute("data-id"),"debts"); }); });
  on("back","click",home);
}
function settle(id,fromScreen){
  var t=db.transactions.filter(function(x){return x.id===id;})[0]; if(!t) return;
  
  function done(m, payCommission){
    t.settled=true; t.settledMethod=m; t.settledDate=todayStr();
    if (payCommission && t.therapistId && t.therapistTake > 0) {
      db.commissionPayments.push({
        id: uid(),
        therapistId: t.therapistId,
        amount: t.therapistTake,
        dateStr: todayStr(),
        createdAt: new Date().toISOString(),
        note: "Bayar komisi instan pelunasan (Transaksi " + t.id.slice(-4) + ")"
      });
    }
    saveDB();
    var msg = "Piutang " + (t.customer || "") + " ditandai lunas." + (payCommission ? " Komisi terapis langsung dibayarkan." : "");
    announce(msg);
    if(fromScreen==="detail") txDetail(id); else debtsScreen();
  }
  
  function askCommission(m){
    if (t.performer === "therapist" && t.therapistTake > 0) {
      render(
        '<h2 class="screen-title">Bayar komisi terapis?</h2>'+
        '<p class="help">Transaksi ini dikerjakan oleh terapis '+esc(t.therapistName)+' dengan komisi '+rupiah(t.therapistTake)+'. Apakah komisi ini langsung dibayarkan saat ini?</p>'+
        '<button class="btn primary big" id="pay-yes">Ya, Bayar Komisi & Tandai Lunas</button>'+
        '<button class="btn" id="pay-no">Tidak, Hanya Tandai Lunas</button>'+
        '<button class="backlink" id="cancel-settle">Kembali</button>'
      );
      announce("Apakah komisi terapis sebesar "+terbilang(t.therapistTake)+" rupiah langsung dibayarkan?");
      on("pay-yes", "click", function(){ done(m, true); });
      on("pay-no", "click", function(){ done(m, false); });
      on("cancel-settle", "click", function(){ settle(id, fromScreen); });
    } else {
      done(m, false);
    }
  }

  render('<h2 class="screen-title">Lunas dengan cara apa?</h2><p class="help">'+esc(t.customer||"Pelanggan")+' membayar '+rupiah(t.total)+'.</p><button class="btn primary" id="cash">Tunai</button><button class="btn" id="tf">Transfer / QRIS</button><button class="backlink" id="back">Kembali</button>');
  on("cash","click",function(){ askCommission("cash"); });
  on("tf","click",function(){ askCommission("transfer"); });
  on("back","click",function(){ if(fromScreen==="detail") txDetail(id); else debtsScreen(); });
}

/* =================== KOMISI =================== */
function accrued(thId){
  var earned=db.transactions.filter(function(t){return t.therapistId===thId && t.settled;}).reduce(function(a,t){return a+(t.therapistTake||0);},0);
  var paid=db.commissionPayments.filter(function(p){return p.therapistId===thId;}).reduce(function(a,p){return a+p.amount;},0);
  return earned-paid;
}
function commissionScreen(){
  var rows=db.therapists.map(function(t){ 
    var txMonth = db.transactions.filter(function(tx){ return tx.therapistId === t.id && monthOf(tx.dateStr) === thisMonth(); });
    var earnedMonth = txMonth.reduce(function(a, tx){ return a + (tx.therapistTake || 0); }, 0);
    return '<div class="list-item"><strong>'+esc(t.name)+'</strong><br><span class="muted">Bulan ini: '+txMonth.length+' Sesi (Komisi: '+rupiah(earnedMonth)+')<br>Belum dibayar (dari sesi lunas): '+rupiah(accrued(t.id))+'</span><br><button class="btn accent" data-id="'+t.id+'" style="margin-top:8px; padding:10px; min-height:auto; font-size:1rem;">Catat pembayaran</button></div>'; 
  }).join("");
  
  render(
    '<h2 class="screen-title">Bayar komisi terapis</h2>'+
    '<button class="btn primary" id="report" style="margin-bottom:18px; text-align:center;">Lihat Performa & Peringkat Terapis</button>'+
    '<h3>Daftar Komisi Terutang</h3>'+
    (db.therapists.length ? rows : '<p class="muted">Belum ada terapis.</p>')+
    '<button class="backlink" id="back">Kembali ke menu</button>'
  );
  
  on("report", "click", function(){ therapistReportScreen(thisMonth()); });
  each("[data-id]",function(b){ b.addEventListener("click",function(){ payComm(b.getAttribute("data-id")); }); });
  on("back","click",home);
}
function payComm(thId){
  var t=db.therapists.filter(function(x){return x.id===thId;})[0]; if(!t) return; var owe=accrued(thId);
  render('<h2 class="screen-title">Bayar komisi '+esc(t.name)+'</h2><p class="help">Belum dibayar: '+rupiah(owe)+'.</p><label for="a">Jumlah dibayar (rupiah)</label><input id="a" type="tel" inputmode="numeric" value="'+(owe>0?owe:0)+'" /><button class="btn primary big" id="ok">Catat pembayaran</button><button class="backlink" id="back">Kembali</button>');
  on("ok","click",function(){ var a=digits(el("a").value); if(a<=0){announce("Jumlah belum benar.");return;} db.commissionPayments.push({id:uid(),therapistId:thId,amount:a,dateStr:todayStr(),createdAt:new Date().toISOString()}); saveDB(); announce("Pembayaran komisi "+t.name+" "+terbilang(a)+" rupiah tercatat."); commissionScreen(); });
  on("back","click",commissionScreen);
}
function therapistReportScreen(ym){
  ym = ym || thisMonth();
  
  var stats = db.therapists.map(function(t){
    var txMonth = db.transactions.filter(function(tx){ return tx.therapistId === t.id && monthOf(tx.dateStr) === ym; });
    var sessions = txMonth.length;
    var commission = txMonth.reduce(function(a, tx){ return a + (tx.therapistTake || 0); }, 0);
    return { therapist: t, sessions: sessions, commission: commission };
  });
  
  stats.sort(function(a, b){ return b.sessions - a.sessions; });
  
  var leaderboard = stats.map(function(item, idx){
    var medal = idx === 0 ? "🏆 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : (idx + 1) + ". ";
    return '<div class="list-item" style="display:flex; justify-content:space-between; align-items:center;">'+
      '<div><strong>'+medal+esc(item.therapist.name)+'</strong><br><span class="muted">Komisi periode ini: '+rupiah(item.commission)+'</span></div>'+
      '<div style="font-size:1.2rem; font-weight:800; color:var(--brand);">'+item.sessions+' Sesi</div>'+
    '</div>';
  }).join("");
  
  render(
    '<h2 class="screen-title">Performa Terapis</h2>'+
    '<div class="row" style="margin-bottom:12px"><button class="btn" id="prev-m">Bulan sebelumnya</button><button class="btn" id="next-m">Berikutnya</button></div>'+
    '<h3>Peringkat Periode '+namaBulan(ym)+'</h3>'+
    '<div class="card">'+(leaderboard || '<p class="muted">Belum ada terapis atau data sesi.</p>')+'</div>'+
    '<button class="backlink" id="back">Kembali</button>'
  );
  
  on("prev-m", "click", function(){ therapistReportScreen(addMonth(ym, -1)); });
  on("next-m", "click", function(){ therapistReportScreen(addMonth(ym, 1)); });
  on("back", "click", commissionScreen);
  announce("Performa terapis bulan "+namaBulan(ym)+".");
}

      tx.items.forEach(function(item){

  });

/* =================== PERHITUNGAN KEUANGAN =================== */
function labaRugi(ym){
  var tx=db.transactions.filter(function(t){return monthOf(t.dateStr)===ym;});
  var jasa=tx.reduce(function(a,t){return a+t.jasa;},0);
  var transport=tx.reduce(function(a,t){return a+(t.transport||0);},0);
  var pendapatan=jasa+transport;
  var komisi=db.transactions.filter(function(t){return t.settled && monthOf(t.settledDate)===ym;}).reduce(function(a,t){return a+(t.therapistTake||0);},0);
  var exp=db.expenses.filter(function(e){return monthOf(e.dateStr)===ym;});
  var bebanCat={}; exp.forEach(function(e){ bebanCat[e.category]=(bebanCat[e.category]||0)+e.amount; });
  var bebanLain=exp.reduce(function(a,e){return a+e.amount;},0);
  var totalBeban=komisi+bebanLain;
  return {ym:ym,jasa:jasa,transport:transport,pendapatan:pendapatan,komisi:komisi,bebanCat:bebanCat,bebanLain:bebanLain,totalBeban:totalBeban,laba:pendapatan-totalBeban,count:tx.length};
}
function neraca(){
  var t=db.transactions;
  var received=t.filter(function(x){return x.settled;}).reduce(function(a,x){return a+x.total;},0);
  var unpaid=t.filter(function(x){return !x.settled;}).reduce(function(a,x){return a+x.total;},0);
  var revenue=received+unpaid;
  var E=db.expenses.reduce(function(a,x){return a+x.amount;},0);
  var Crec=t.filter(function(x){return x.settled;}).reduce(function(a,x){return a+(x.therapistTake||0);},0);
  var Cpaid=db.commissionPayments.reduce(function(a,x){return a+x.amount;},0);
  var M=db.capital.filter(function(c){return c.type==="modal";}).reduce(function(a,c){return a+c.amount;},0);
  var P=db.capital.filter(function(c){return c.type==="prive";}).reduce(function(a,c){return a+c.amount;},0);
  var Akas=db.assets.filter(function(x){return x.acquire==="kas";}).reduce(function(a,x){return a+x.cost;},0);
  var Amod=db.assets.filter(function(x){return x.acquire!=="kas";}).reduce(function(a,x){return a+x.cost;},0);
  var Aall=Akas+Amod;
  var kas=M-P+received-E-Cpaid-Akas;
  var piutang=unpaid;
  var asetTetap=Aall;
  var totalAset=kas+piutang+asetTetap;
  var utangKomisi=Crec-Cpaid;
  var totalLiab=utangKomisi;
  var modalDisetor=M-P+Amod;
  var labaDitahan=revenue-E-Crec;
  var totalEkuitas=modalDisetor+labaDitahan;
  return {kas:kas,piutang:piutang,asetTetap:asetTetap,totalAset:totalAset,utangKomisi:utangKomisi,totalLiab:totalLiab,modalDisetor:modalDisetor,labaDitahan:labaDitahan,totalEkuitas:totalEkuitas,seimbang:Math.round(totalAset)===Math.round(totalLiab+totalEkuitas)};
}

    });

function compileCashFlows(){
  var list = [];
  
  (db.transactions || []).forEach(function(t){
    if (t.payment !== "unpaid") {
      list.push({
        date: t.dateStr,
        sortDate: t.createdAt || t.dateStr,
        type: "inflow",
        amount: t.total,
        desc: "Pendapatan jasa " + t.items.map(function(i){ return i.name; }).join(", ") + (t.customer ? " (" + t.customer + ")" : "")
      });
    } else if (t.settled && t.settledDate) {
      list.push({
        date: t.settledDate,
        sortDate: t.settledDate + 'T23:59:59Z',
        type: "inflow",
        amount: t.total,
        desc: "Pelunasan piutang " + (t.customer || "Pelanggan")
      });
    }
  });
  
  (db.expenses || []).forEach(function(e){
    list.push({
      date: e.dateStr,
      sortDate: e.createdAt || e.dateStr,
      type: "outflow",
      amount: e.amount,
      desc: "Biaya " + e.category + (e.note ? " (" + e.note + ")" : "")
    });
  });
  
  (db.capital || []).forEach(function(c){
    list.push({
      date: c.dateStr,
      sortDate: c.createdAt || c.dateStr,
      type: c.type === "modal" ? "inflow" : "outflow",
      amount: c.amount,
      desc: (c.type === "modal" ? "Setor modal" : "Pengambilan pribadi") + (c.note ? " (" + c.note + ")" : "")
    });
  });
  
  (db.commissionPayments || []).forEach(function(p){
    var th = db.therapists.filter(function(x){ return x.id === p.therapistId; })[0];
    var name = th ? th.name : "Terapis";
    list.push({
      date: p.dateStr,
      sortDate: p.createdAt || p.dateStr,
      type: "outflow",
      amount: p.amount,
      desc: "Bayar komisi terapis " + name + (p.note ? " (" + p.note + ")" : "")
    });
  });
  
  (db.assets || []).forEach(function(a){
    if (a.acquire === "kas") {
      list.push({
        date: a.dateStr,
        sortDate: a.createdAt || a.dateStr,
        type: "outflow",
        amount: a.cost,
        desc: "Beli aset dari kas: " + a.name
      });
    }
  });
  
  list.sort(function(a, b){
    if(a.date !== b.date) return a.date < b.date ? -1 : 1;
    return a.sortDate < b.sortDate ? -1 : 1;
  });
  
  var bal = 0;
  list.forEach(function(item){
    if(item.type === "inflow") bal += item.amount;
    else bal -= item.amount;
    item.balance = bal;
  });
  
  return list;
}
function cashLedgerScreen(){
  var flows = compileCashFlows();
  var reversed = flows.slice().reverse();
  
  function drawList(list) {
    return list.length ? list.map(function(item){
      var isPlus = item.type === "inflow";
      var color = isPlus ? "var(--ok)" : "var(--warn)";
      var prefix = isPlus ? "+" : "−";
      return '<div class="list-item">'+
        '<strong>'+esc(item.date)+'</strong> · '+esc(item.desc)+'<br>'+
        '<span style="color:'+color+'; font-weight:700;">'+prefix+' '+rupiah(item.amount)+'</span> · '+
        '<span class="muted">Saldo: '+rupiah(item.balance)+'</span>'+
      '</div>';
    }).join("") : '<p class="muted">Tidak ada mutasi kas.</p>';
  }
  
  render(
    '<h2 class="screen-title">Buku Kas Harian</h2>'+
    '<p class="help">Menampilkan seluruh aliran kas masuk dan keluar diurutkan dari yang terbaru.</p>'+
    '<label for="cash-search">Cari Deskripsi Mutasi</label>'+
    '<input id="cash-search" type="text" placeholder="Ketik deskripsi atau tanggal..." autocomplete="off" />'+
    '<p class="help" id="cash-count" style="margin: 8px 0;">Menampilkan '+reversed.length+' mutasi kas.</p>'+
    '<div id="cash-list">'+drawList(reversed)+'</div>'+
    '<button class="backlink" id="back">Kembali</button>'
  );
  
  var searchInput = el("cash-search");
  var listContainer = el("cash-list");
  var countEl = el("cash-count");
  
  searchInput.addEventListener("input", function(){
    var q = searchInput.value.toLowerCase();
    var filtered = reversed.filter(function(item){
      return (item.desc || "").toLowerCase().indexOf(q) !== -1 || (item.date || "").indexOf(q) !== -1;
    });
    listContainer.innerHTML = drawList(filtered);
    countEl.textContent = "Ditemukan " + filtered.length + " mutasi kas.";
    announce("Ditemukan " + filtered.length + " mutasi kas.");
  });
  
  on("back", "click", financialMenuScreen);
  announce("Buku kas harian dibuka.");
}

    '<div id="promo-list" style="margin-top:12px; max-height:220px; overflow-y:auto; border:1px solid var(--line); border-radius:12px; padding:8px; background:#fff;">'+drawCustomerPromoList("")+'</div>'+
    
    '<div class="divider"></div>'+
    '<h3>3. Pelanggan Teraktif (Loyalitas)</h3>'+

  on("save-temp", "click", function(){

function restore(ev){ var f=ev.target.files[0]; if(!f) return; var r=new FileReader(); r.onload=function(){ try{ var d=JSON.parse(r.result); if(!d.settings||!d.transactions) throw 0; db=d; saveDB(); announce("Data berhasil dipulihkan."); home(); }catch(e){ announce("File tidak dikenali. Pemulihan dibatalkan."); } }; r.readAsText(f); }
